<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0e0e;
        --surface: #161616;
        --border: #2a2a2a;
        --accent: #c8f135;
        --text: #f0f0f0;
        --muted: #888;
      }

      body {
        background: var(--bg);
        font-family: "Inter", sans-serif;
        color: var(--text);
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        height: 64px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      /* LOGO */
      .logo {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-decoration: none;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--accent);
        border-radius: 8px;
        display: grid;
        place-items: center;
      }

      .logo-icon svg {
        width: 18px;
        height: 18px;
      }

      .logo-name {
        font-family: "Syne", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      /* NAV LINKS */
      .nav-links {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--muted);
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.4rem 0.85rem;
        border-radius: 6px;
        transition:
          color 0.2s,
          background 0.2s;
      }

      .nav-links a:hover {
        color: var(--text);
        background: var(--border);
      }

      .nav-links a.active {
        color: var(--text);
      }

      /* CTA */
      .nav-cta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .btn-ghost {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        cursor: pointer;
        padding: 0.4rem 0.85rem;
        border-radius: 6px;
        transition:
          color 0.2s,
          background 0.2s;
      }

      .btn-ghost:hover {
        color: var(--text);
        background: var(--border);
      }

      .btn-primary {
        background: var(--accent);
        color: #0e0e0e;
        border: none;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        cursor: pointer;
        padding: 0.45rem 1.1rem;
        border-radius: 6px;
        transition: opacity 0.2s;
      }

      .btn-primary:hover {
        opacity: 0.85;
      }

      /* HAMBURGER (mobile) */
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 4px;
      }

      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--text);
        border-radius: 2px;
        transition:
          transform 0.3s,
          opacity 0.3s;
      }

      @media (max-width: 640px) {
        .nav-links,
        .nav-cta {
          display: none;
        }
        .hamburger {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <!-- LOGO (left) -->
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#0e0e0e"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            />
          </svg>
        </div>
        <span class="logo-name">MyBrand</span>
      </a>

      <!-- NAV LINKS (center) -->
      <ul class="nav-links">
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <!-- CTA (right) -->
      <!-- <div class="nav-cta">
        <button class="btn-ghost">Log in</button>
        <button class="btn-primary">Get Started</button>
      </div> -->

      <!-- Hamburger (mobile) -->
      <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </nav>
  </body>
</html>
